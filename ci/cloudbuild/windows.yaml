options:
  dynamic_substitutions: true
  substitutionOption: 'ALLOW_LOOSE'

substitutions:
  _ZONE: 'us-east1-b'
  _MACHINE_TYPE: 'n2-standard-64' # 64 vCPUs, 256 GB RAM for fast compilation
  _IMAGE_FAMILY: 'windows-2022' # Public image family
  _IMAGE_PROJECT: 'windows-cloud'
  _SERVICE_ACCOUNT: 'windows-builder-sa@cloud-cpp-testing-resources.iam.gserviceaccount.com'
  _CACHE_BUCKET: 'cloud-cpp-testing-resources_cloudbuild'
  _LOGS_BUCKET: 'cloud-cpp-testing-resources_cloudbuild'
  _BUILD_TYPE: 'Release'
  _FEATURES: 'storage'

steps:
  # Step 1: Compress and upload workspace source code to GCS
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'upload-source'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        tar --exclude='.git' -czf "source-${BUILD_ID}.tar.gz" .
        gcloud storage cp "source-${BUILD_ID}.tar.gz" "gs://${_CACHE_BUCKET}/source/source-${BUILD_ID}.tar.gz"
        rm "source-${BUILD_ID}.tar.gz"

  # Step 1.5: Select US zone with most available N2 CPU quota
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'select-zone'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if ! python3 -c '
        import json, subprocess, sys
        STANDARD_US_REGIONS = {"us-central1", "us-east1", "us-east4", "us-east5", "us-south1", "us-west1", "us-west2", "us-west3", "us-west4"}

        def is_machine_type_available(zone, machine_type):
            try:
                res = subprocess.run([
                    "gcloud", "compute", "machine-types", "list",
                    f"--filter=zone:{zone} AND name:{machine_type}",
                    "--format=value(name)"
                ], capture_output=True, text=True, check=True)
                return machine_type in res.stdout
            except Exception as e:
                print(f"Error checking machine type availability in zone {zone}: {e}", file=sys.stderr)
                return False

        try:
            result = subprocess.run(["gcloud", "compute", "regions", "list", "--filter=name ~ ^us-", "--format=json(name,quotas)"], capture_output=True, text=True, check=True)
            regions = json.loads(result.stdout)
            
            regions_quota = []
            for region in regions:
                name = region.get("name")
                if name not in STANDARD_US_REGIONS: continue
                for quota in region.get("quotas", []):
                    if quota.get("metric") == "N2_CPUS":
                        available = quota.get("limit", 0.0) - quota.get("usage", 0.0)
                        regions_quota.append((name, available))
                        break
            
            regions_quota.sort(key=lambda x: x[1], reverse=True)
            
            candidate_zones = []
            for region_name, available in regions_quota:
                if available < 64:
                    print(f"Skipping region {region_name}: not enough available N2_CPUS ({available}).", file=sys.stderr)
                    continue
                
                zones_result = subprocess.run([
                    "gcloud", "compute", "zones", "list",
                    f"--filter=region ~ /regions/{region_name} AND status=UP",
                    "--format=value(name)"
                ], capture_output=True, text=True, check=True)
                zones = [line.strip() for line in zones_result.stdout.splitlines() if line.strip()]
                
                for zone in zones:
                    print(f"Checking machine type availability in zone {zone}...", file=sys.stderr)
                    if is_machine_type_available(zone, "${_MACHINE_TYPE}"):
                        candidate_zones.append(zone)
            
            if not candidate_zones:
                print("Error: No suitable zones with enough quota and machine type support found.", file=sys.stderr)
                sys.exit(1)
                
            print(f"Found candidate zones: {candidate_zones}", file=sys.stderr)
            with open("candidate_zones.txt", "w") as f:
                for zone in candidate_zones:
                    f.write(zone + "\n")
        except Exception as e:
            print(f"Error selecting zone: {e}", file=sys.stderr)
            sys.exit(1)
        '; then
          echo "Warning: failed to dynamically select zone. Falling back to ${_ZONE}."
          echo "${_ZONE}" > candidate_zones.txt
        fi

  # Step 2: Create ephemeral GCE Windows Instance and run startup script
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'create-vm'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        vcpkg_version=$(cat ci/etc/vcpkg-version.txt)
        created=false
        
        # Read candidate zones
        if [ -f candidate_zones.txt ]; then
          mapfile -t zones < candidate_zones.txt
        else
          zones=("${_ZONE}")
        fi
        
        for zone in "$${zones[@]}"; do
          echo "Attempting to create VM in zone: $$zone..."
          if gcloud compute instances create "wincmake-${BUILD_ID}" \
            --project="${PROJECT_ID}" \
            --zone="$$zone" \
            --machine-type="${_MACHINE_TYPE}" \
            --image-family="${_IMAGE_FAMILY}" \
            --image-project="${_IMAGE_PROJECT}" \
            --service-account="${_SERVICE_ACCOUNT}" \
            --scopes="https://www.googleapis.com/auth/cloud-platform" \
            --metadata="source-archive=gs://${_CACHE_BUCKET}/source/source-${BUILD_ID}.tar.gz,build-type=${_BUILD_TYPE},features=${_FEATURES},logs-bucket=gs://${_LOGS_BUCKET}/logs/wincmake-${BUILD_ID},vcpkg-version=${vcpkg_version}" \
            --metadata-from-file="windows-startup-script-ps1=ci/cloudbuild/builds/windows-startup.ps1"; then
            echo "$$zone" > selected_zone.txt
            created=true
            break
          else
            echo "Warning: failed to create VM in zone $$zone, trying next candidate."
          fi
        done
        
        if [ "$$created" = false ]; then
          echo "Error: Failed to create VM in all candidate zones."
          exit 1
        fi

  # Step 3: Poll GCS for status file and stream build logs, then clean up GCE VM
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'poll-build-status'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        selected_zone="${_ZONE}"
        if [ -f selected_zone.txt ]; then
          selected_zone=$(cat selected_zone.txt)
        fi
        echo "Using zone: $$selected_zone"

        log_lines=0
        cleanup() {
          echo "Fetching final logs..."
          gcloud storage cp "gs://${_LOGS_BUCKET}/logs/wincmake-${BUILD_ID}/build.log" build.log 2>/dev/null || true
          if [ -f build.log ]; then
             new_lines=$(wc -l < build.log)
             if [ "$new_lines" -gt "$log_lines" ]; then
                tail -n +"$((log_lines + 1))" build.log
             fi
          fi
          rm -rf build-logs
          if gcloud storage cp -r "gs://${_LOGS_BUCKET}/logs/wincmake-${BUILD_ID}/build-logs" . 2>/dev/null; then
             if [ -f build-logs/cmake/vcpkg-manifest-install.log ]; then
                echo "========================================================================="
                echo " Content of vcpkg-manifest-install.log:"
                echo "========================================================================="
                cat build-logs/cmake/vcpkg-manifest-install.log
                echo "========================================================================="
             fi

             files_to_scan="build.log"
             if [ -f build-logs/cmake/vcpkg-manifest-install.log ]; then
                files_to_scan="$files_to_scan build-logs/cmake/vcpkg-manifest-install.log"
             fi
             failed_logs=$(grep -A 1 -i "See logs for more information:" $files_to_scan 2>/dev/null | \
                           sed -n -e 's/.*buildtrees[/\\]\(.*\)/\1/p' | \
                           tr '\\' '/' | tr -d '\r' | sort -u)

             if [ -n "$failed_logs" ]; then
                echo "========================================================================="
                echo " Content of failed package logs:"
                echo "========================================================================="
                echo "$failed_logs" | while read -r logpath; do
                   if [ -f "build-logs/vcpkg/$logpath" ]; then
                      echo "--- File: vcpkg/$logpath ---"
                      cat "build-logs/vcpkg/$logpath"
                      echo "------------------------------------------------------------------------"
                   fi
                done
             fi
             rm -rf build-logs
          fi
          echo "Cleaning up VM and source archive..."
          gcloud compute instances delete "wincmake-${BUILD_ID}" --zone="$$selected_zone" --quiet || true
          gcloud storage rm "gs://${_CACHE_BUCKET}/source/source-${BUILD_ID}.tar.gz" || true
        }
        trap cleanup EXIT

        echo "Waiting for build completion..."
        # Wait a bit for the VM to start up and begin writing logs
        sleep 60

        # Read the logs continuously
        gcloud storage cp "gs://${_LOGS_BUCKET}/logs/wincmake-${BUILD_ID}/build.log" build.log 2>/dev/null || touch build.log
        log_lines=$(wc -l < build.log)

        until gcloud storage objects describe "gs://${_LOGS_BUCKET}/logs/wincmake-${BUILD_ID}/status.json" >/dev/null 2>&1; do
          sleep 20
          if gcloud storage cp "gs://${_LOGS_BUCKET}/logs/wincmake-${BUILD_ID}/build.log" build.log 2>/dev/null; then
             new_lines=$(wc -l < build.log)
             if [ "$new_lines" -gt "$log_lines" ]; then
                tail -n +"$((log_lines + 1))" build.log
                log_lines=$new_lines
             fi
          fi
        done

        # Output final logs and verify success status
        gcloud storage cp "gs://${_LOGS_BUCKET}/logs/wincmake-${BUILD_ID}/build.log" build.log 2>/dev/null
        new_lines=$(wc -l < build.log)
        if [ "$new_lines" -gt "$log_lines" ]; then
           tail -n +"$((log_lines + 1))" build.log
        fi

        status=$(gcloud storage cat "gs://${_LOGS_BUCKET}/logs/wincmake-${BUILD_ID}/status.json" | grep -o '"status": "[^"]*' | cut -d'"' -f4)
        if [ "$status" != "success" ]; then
          echo "Build failed!"
          exit 1
        fi
